<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Senior Developer Interview - 5 Year Experience</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --bg-card: #161b22; --border: #30363d;
            --text: #e6edf3; --text-muted: #8b949e; --text-dim: #484f58;
            --blue: #58a6ff; --green: #238636; --purple: #bc8cff;
            --orange: #f0883e; --red: #da3633; --green-light: #7ee787;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; -webkit-tap-highlight-color: transparent;
        }

        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; background: var(--bg-card);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50;
        }
        .topbar a { color: var(--text-muted); text-decoration: none; font-size: 1.3em; }
        .topbar a:hover { color: var(--blue); }
        .topbar .title { font-weight: 600; font-size: 0.95em; }
        .topbar .round-info { font-size: 0.8em; color: var(--text-muted); }

        .container { max-width: 820px; margin: 0 auto; padding: 24px 16px 100px; }

        /* Interviewer persona */
        .interviewer {
            display: flex; align-items: flex-start; gap: 14px;
            margin-bottom: 20px; animation: fadeIn 0.4s ease;
        }
        .interviewer-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2em; flex-shrink: 0;
        }
        .interviewer-bubble {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px; padding: 16px 20px;
            flex: 1; position: relative;
        }
        .interviewer-name { font-size: 0.75em; color: var(--blue); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .interviewer-bubble p { font-size: 1.05em; line-height: 1.7; }
        .interviewer-bubble .followup { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 0.92em; color: var(--orange); font-style: italic; }

        /* Round header */
        .round-header {
            text-align: center; margin-bottom: 32px; padding: 20px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; animation: fadeIn 0.5s ease;
        }
        .round-header h2 { font-size: 1.4em; margin-bottom: 8px; color: var(--blue); }
        .round-header p { color: var(--text-muted); font-size: 0.9em; }
        .round-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.75em; font-weight: 600; margin-top: 10px; }
        .round-badge.technical { background: #1f6feb22; color: var(--blue); border: 1px solid var(--blue); }
        .round-badge.scenario { background: #8957e522; color: var(--purple); border: 1px solid var(--purple); }
        .round-badge.system { background: #23863622; color: var(--green-light); border: 1px solid var(--green); }
        .round-badge.behavioral { background: #d2992222; color: var(--orange); border: 1px solid var(--orange); }

        /* Progress */
        .progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width 0.4s; border-radius: 2px; }

        /* Answer section */
        .your-answer { margin: 16px 0; }
        .your-answer textarea {
            width: 100%; min-height: 120px; padding: 14px;
            background: #0d1117; border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-size: 0.95em;
            font-family: inherit; resize: vertical; outline: none;
        }
        .your-answer textarea:focus { border-color: var(--blue); }
        .your-answer textarea::placeholder { color: var(--text-dim); }
        .your-answer label { font-size: 0.82em; color: var(--text-muted); margin-bottom: 6px; display: block; }

        /* Buttons */
        .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
        .btn {
            padding: 14px 24px; border-radius: 10px; border: none;
            font-size: 0.95em; font-weight: 600; cursor: pointer;
            transition: all 0.2s; flex: 1; min-width: 140px; text-align: center;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--blue); color: #fff; }
        .btn-primary:hover { background: #79c0ff; }
        .btn-secondary { background: #21262d; color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--blue); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Natural answer (how to actually speak it) */
        .natural-answer {
            margin-top: 20px; border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border); display: none; animation: slideDown 0.4s ease;
        }
        .natural-answer.visible { display: block; }
        .natural-header { padding: 12px 16px; font-size: 0.82em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; background: #8b5cf622; color: #a78bfa; border-bottom: 1px solid #8b5cf6; }
        .natural-body { padding: 16px 20px; background: var(--bg-card); font-size: 0.93em; line-height: 1.8; color: var(--text); }
        .natural-body .speaker { display: block; font-weight: 600; color: #a78bfa; margin-top: 14px; margin-bottom: 4px; font-size: 0.82em; text-transform: uppercase; }
        .natural-body .speaker:first-child { margin-top: 0; }
        .natural-body .speech { display: block; padding: 10px 14px; background: #8b5cf60a; border-left: 3px solid #8b5cf640; border-radius: 0 8px 8px 0; margin: 6px 0 14px; font-style: italic; line-height: 1.7; }
        .natural-body .pause { display: inline-block; color: var(--text-muted); font-size: 0.8em; margin: 0 4px; font-style: normal; }
        .natural-body .tip { display: block; margin-top: 14px; padding: 10px 14px; background: #f0883e15; border: 1px solid #f0883e40; border-radius: 8px; font-size: 0.85em; font-style: normal; }
        .natural-body .tip strong { color: var(--orange); }

        /* Expected answer / evaluation */
        .evaluation {
            margin-top: 20px; border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border); display: none; animation: slideDown 0.4s ease;
        }
        .evaluation.visible { display: block; }
        .eval-header { padding: 12px 16px; font-size: 0.82em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .eval-header.expected { background: #23863622; color: var(--green-light); border-bottom: 1px solid #238636; }
        .eval-header.criteria { background: #d2992222; color: var(--orange); border-bottom: 1px solid #d29922; }
        .eval-body { padding: 16px; background: var(--bg-card); }
        .eval-body p { font-size: 0.93em; line-height: 1.7; margin-bottom: 8px; }
        .eval-body ul { padding-left: 18px; margin: 8px 0; }
        .eval-body li { font-size: 0.9em; line-height: 1.6; margin: 4px 0; }
        .eval-body code { background: #0d1117; padding: 2px 6px; border-radius: 4px; font-size: 0.83em; color: #79c0ff; font-family: 'Cascadia Code', monospace; }
        .eval-body pre { background: #0d1117; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; font-size: 0.8em; line-height: 1.5; border: 1px solid var(--border); }
        .eval-body .must-mention { background: #da363315; border: 1px solid #da363350; border-radius: 8px; padding: 12px; margin-top: 12px; }
        .eval-body .must-mention h5 { color: #ff7b72; font-size: 0.78em; text-transform: uppercase; margin-bottom: 6px; }
        .eval-body .bonus { background: #23863615; border: 1px solid #23863650; border-radius: 8px; padding: 12px; margin-top: 10px; }
        .eval-body .bonus h5 { color: var(--green-light); font-size: 0.78em; text-transform: uppercase; margin-bottom: 6px; }

        /* Self rating */
        .self-rate { margin-top: 16px; text-align: center; display: none; animation: fadeIn 0.3s ease; }
        .self-rate.visible { display: block; }
        .self-rate p { font-size: 0.88em; color: var(--text-muted); margin-bottom: 12px; }
        .rate-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .rate-btn {
            padding: 12px 20px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text); cursor: pointer;
            font-size: 0.88em; font-weight: 500; transition: all 0.2s; min-width: 130px;
        }
        .rate-btn:hover { transform: translateY(-2px); }
        .rate-btn:active { transform: scale(0.95); }
        .rate-btn.strong { border-color: var(--green); color: var(--green-light); }
        .rate-btn.strong:hover { background: #23863622; }
        .rate-btn.okay { border-color: var(--orange); color: var(--orange); }
        .rate-btn.okay:hover { background: #d2992222; }
        .rate-btn.weak { border-color: var(--red); color: #ff7b72; }
        .rate-btn.weak:hover { background: #da363322; }

        /* Results */
        .results { display: none; animation: fadeIn 0.5s ease; padding: 30px 0; }
        .results.visible { display: block; }
        .results h2 { text-align: center; font-size: 1.6em; margin-bottom: 24px; }
        .verdict { text-align: center; padding: 24px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 24px; }
        .verdict .score-big { font-size: 3em; font-weight: 700; }
        .verdict .verdict-text { font-size: 1.1em; margin-top: 8px; color: var(--text-muted); }
        .round-scores { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .round-score { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
        .round-score .rs-label { font-size: 0.8em; color: var(--text-muted); margin-bottom: 6px; }
        .round-score .rs-value { font-size: 1.4em; font-weight: 700; }
        .feedback-list { list-style: none; padding: 0; }
        .feedback-list li { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.9em; display: flex; align-items: flex-start; gap: 10px; }
        .feedback-list li:last-child { border-bottom: none; }
        .retry-btn { display: block; margin: 24px auto 0; padding: 14px 32px; background: var(--blue); color: #fff; border: none; border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; }
        .retry-btn:hover { background: #79c0ff; }

        /* Timer */
        .timer { position: fixed; top: 60px; right: 16px; background: var(--bg-card); border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; font-size: 0.8em; color: var(--text-muted); z-index: 40; }
        .timer.warning { color: var(--orange); border-color: var(--orange); }

        /* Light theme */
        body.light { --bg: #fff; --bg-card: #f6f8fa; --border: #d1d9e0; --text: #1f2328; --text-muted: #6e7781; --text-dim: #8c959f; --blue: #0550ae; --green: #1a7f37; --purple: #6639ba; --orange: #953800; --red: #cf222e; --green-light: #1a7f37; }
        body.light .your-answer textarea { background: #fff; }
        body.light .eval-body pre { background: #f6f8fa; }
        body.light .eval-body code { background: #f6f8fa; color: #0550ae; }
        body.light .natural-header { background: #8b5cf615; color: #6639ba; border-bottom-color: #6639ba; }
        body.light .natural-body .speaker { color: #6639ba; }
        body.light .natural-body .speech { background: #8b5cf608; border-left-color: #6639ba40; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 3000px; } }

        @media (max-width: 600px) {
            .container { padding: 16px 12px 80px; }
            .interviewer-bubble { padding: 12px 14px; }
            .interviewer-bubble p { font-size: 0.98em; }
            .btn-row { flex-direction: column; }
            .btn { min-width: 100%; }
            .rate-btns { flex-direction: column; }
            .rate-btn { width: 100%; }
            .round-scores { grid-template-columns: 1fr 1fr; }
            .timer { top: 56px; right: 8px; font-size: 0.72em; padding: 4px 8px; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="index.html" title="Home">&#x1F3E0;</a>
        <span class="title">Senior Developer Interview (5 YOE)</span>
        <span class="round-info" id="roundInfo">Round 1/4</span>
    </div>

    <div class="timer" id="timer">&#x23F1; 00:00</div>

    <div class="container">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div id="content"></div>
        <div class="results" id="results"></div>
    </div>

    <script>
    // ============= INTERVIEW STRUCTURE =============
    // Simulates a real 4-round Salesforce senior developer interview
    
    const rounds = [
        {
            name: 'Technical Deep Dive',
            badge: 'technical',
            description: 'Core platform knowledge, architecture decisions, and hands-on coding patterns.',
            questions: [
                {
                    q: `Let's start with something fundamental. You have a trigger on Account that needs to update all related Contacts when a field changes. Walk me through how you'd architect this. What patterns would you use?`,
                    followup: `What if this trigger processes 10,000 Accounts in a batch context? How does your design hold up?`,
                    expected: `<p><strong>Expected architecture:</strong></p>
<ul>
<li><strong>Trigger Handler Pattern</strong> &mdash; Separate trigger logic from trigger file. One trigger per object, delegating to a handler class.</li>
<li><strong>Recursion prevention</strong> &mdash; Static Set&lt;Id&gt; to track processed records, NOT a simple boolean flag (boolean fails in bulk).</li>
<li><strong>Bulkified query</strong> &mdash; Query contacts WHERE AccountId IN :accountIds (one SOQL, not per-account).</li>
<li><strong>Map-based processing</strong> &mdash; Map&lt;Id, Account&gt; to match contacts to their accounts efficiently.</li>
<li><strong>Single DML</strong> &mdash; Collect all contact updates in a List, one update statement at the end.</li>
</ul>
<pre><code>// Trigger (thin)
trigger AccountTrigger on Account (after update) {
    AccountTriggerHandler.handleAfterUpdate(Trigger.newMap, Trigger.oldMap);
}

// Handler
public class AccountTriggerHandler {
    private static Set&lt;Id&gt; processed = new Set&lt;Id&gt;();
    
    public static void handleAfterUpdate(Map&lt;Id, Account&gt; newMap, Map&lt;Id, Account&gt; oldMap) {
        List&lt;Id&gt; changedAccounts = new List&lt;Id&gt;();
        for (Id accId : newMap.keySet()) {
            if (processed.contains(accId)) continue;
            if (newMap.get(accId).Status__c != oldMap.get(accId).Status__c) {
                changedAccounts.add(accId);
                processed.add(accId);
            }
        }
        if (changedAccounts.isEmpty()) return;
        
        List&lt;Contact&gt; contactsToUpdate = [
            SELECT Id, Account_Status__c FROM Contact 
            WHERE AccountId IN :changedAccounts
        ];
        for (Contact c : contactsToUpdate) {
            c.Account_Status__c = newMap.get(c.AccountId).Status__c;
        }
        update contactsToUpdate;
    }
}</code></pre>
<p><strong>For 10K Accounts in batch:</strong> The code is already bulk-safe. One SOQL query, one DML. But if contacts per account is high (50K+ total contacts), consider processing in chunks or using Queueable chaining.</p>
<div class="must-mention"><h5>Must mention for 5 YOE</h5><ul><li>Trigger handler pattern (not raw trigger logic)</li><li>Recursion control with Set, not boolean</li><li>Governor limit awareness (SOQL/DML not in loops)</li><li>Understanding batch context implications</li></ul></div>
<div class="bonus"><h5>Bonus points</h5><ul><li>Mentions using SOQL for-loop if contacts might exceed 50K</li><li>Discusses trigger frameworks (fflib, or custom TriggerHandler base class)</li><li>Mentions @TestVisible for unit testing the static set</li></ul></div>`
                    ,
                    naturalAnswer: `<span class="speaker">You (confident, structured):</span>
<span class="speech">"Great question. So for this scenario, I'd definitely use a Trigger Handler pattern — I never put logic directly in the trigger file itself. We keep our triggers thin, just one trigger per object delegating to a handler class."</span>
<span class="pause">*brief pause, organizing thoughts*</span>
<span class="speech">"For the actual implementation — first thing I'd do in the handler is check which Accounts actually had the field value change. I'd compare Trigger.newMap against Trigger.oldMap and collect only the changed IDs. No point processing records that didn't change, right?"</span>
<span class="speech">"Then I'd query all related Contacts in ONE bulk query — <code>WHERE AccountId IN :changedAccountIds</code>. Map-based processing to match contacts back to their parent accounts. Update the field on each contact, then a single DML statement at the end."</span>
<span class="speech">"For recursion prevention, I always use a static <code>Set&lt;Id&gt;</code> of processed record IDs — never a boolean flag, because a boolean breaks in bulk contexts. If the trigger fires again, already-processed records get skipped."</span>
<span class="speaker">Interviewer asks about 10K accounts in batch:</span>
<span class="speech">"Yeah, so the good news is this design is already bulk-safe. One SOQL, one DML regardless of batch size. The main concern would be if each account has hundreds of contacts — then you might hit heap size limits with a very large List. In that case, I'd use a SOQL for-loop to process contacts in chunks of 200, or if we're talking truly massive volumes, I'd consider chaining Queueables."</span>
<span class="tip"><strong>Pro tip:</strong> Start with the pattern name ("Trigger Handler Pattern"), then walk through your thought process step by step. Mention bulkification naturally — it shows you think in production terms, not just "it works in my dev org."</span>`
                },
                {
                    q: `You mentioned LWC on your resume. Explain how you'd build a complex parent-child component where the parent has a data table and clicking a row opens a modal for editing. How do you manage state?`,
                    followup: `How do you handle the scenario where the user edits data in the modal, saves, and the table needs to refresh? What if the save partially fails?`,
                    expected: `<p><strong>Architecture:</strong></p>
<ul>
<li><strong>Parent component</strong>: Holds the data (single source of truth). Passes row data to modal via @api. Listens for custom events from modal.</li>
<li><strong>Modal component</strong>: Receives data via @api, works on a CLONE (never mutate parent's data directly). Dispatches 'save' event with changed data.</li>
<li><strong>State management</strong>: Parent owns the canonical data array. Modal gets a deep copy. On save, parent merges changes back.</li>
</ul>
<pre><code>// Parent
handleRowClick(event) {
    this.selectedRow = JSON.parse(JSON.stringify(event.detail.row)); // Deep clone!
    this.showModal = true;
}

handleModalSave(event) {
    const updatedRow = event.detail;
    // Optimistic UI: update table immediately
    this.data = this.data.map(row => 
        row.Id === updatedRow.Id ? updatedRow : row
    );
    this.showModal = false;
    // Then persist to server
    this.saveToServer(updatedRow);
}

async saveToServer(record) {
    try {
        await updateRecord({ fields: record });
    } catch (error) {
        // Rollback optimistic update
        await refreshApex(this.wiredData);
        this.showToast('Error', error.body.message, 'error');
    }
}</code></pre>
<p><strong>For partial failures:</strong> Use <code>Database.update(records, false)</code> (allOrNone=false) on server, return SaveResult[] to client. Client marks failed rows with error state and only refreshes those rows.</p>
<div class="must-mention"><h5>Must mention</h5><ul><li>Deep clone to avoid reference mutation</li><li>Custom events for child→parent communication</li><li>Single source of truth pattern</li><li>Optimistic UI with rollback strategy</li><li>refreshApex() for re-fetching wire data</li></ul></div>
<div class="bonus"><h5>Bonus</h5><ul><li>Mentions tracking draft state per row</li><li>Error boundary (errorCallback) in parent</li><li>Accessibility: focus management when modal opens/closes</li></ul></div>`
                    naturalAnswer: `<span class="speaker">You (thinking out loud, drawing on experience):</span>
<span class="speech">"So I've actually built this exact pattern in a recent project. The key principle I follow is single source of truth â€” the parent component owns the data. Always."</span>
<span class="speech">"Here's how I'd structure it: the parent holds the full data array, renders the lightning-datatable or a custom table. When a user clicks a row, I capture that row's data, make a deep copy using JSON.parse(JSON.stringify()) â€” super important, you never want the modal mutating the parent's data directly â€” and pass that clone to the modal via an @api property."</span>
<span class="pause">*gestures as if drawing a diagram*</span>
<span class="speech">"The modal is its own child component. It receives the data, user edits it, and when they hit Save, the modal dispatches a custom event â€” something like 'recordsaved' â€” with the updated data in event.detail. The parent listens for that event, merges the changes back into its data array, and closes the modal."</span>
<span class="speech">"For the save itself, I typically use an optimistic UI approach. Update the table immediately so the user sees instant feedback, then call the Apex method. If the server save fails, I roll back by calling refreshApex on the wired data. And I show a toast with the error message."</span>
<span class="speaker">On partial failures:</span>
<span class="speech">"Right, so on the Apex side, I'd use Database.update with allOrNone set to false. That gives me back SaveResult array. I send that back to the client, mark the failed rows with an error CSS class, and only refresh those specific rows. The successfully saved ones stay as-is."</span>
<span class="tip"><strong>Pro tip:</strong> Mention "single source of truth" early â€” it instantly signals you understand component architecture. Then walk through the data flow: parent â†’ clone â†’ child â†’ event â†’ parent merge.</span>`
                },
                {
                    q: `Tell me about a time you had to debug a production issue with governor limits. What was happening, how did you diagnose it, and what was the fix?`,
                    followup: `How would you prevent similar issues from happening again? What monitoring would you put in place?`,
                    expected: `<p><strong>Expected structured answer (STAR method):</strong></p>
<p><strong>Situation:</strong> Production users getting "Too many SOQL queries: 101" when saving Opportunities with many line items.</p>
<p><strong>Diagnosis approach:</strong></p>
<ul>
<li>Check Debug Logs &mdash; enable for affected user, reproduce the issue</li>
<li>Look at SOQL_QUERIES_ISSUED in log header</li>
<li>Identify the loop &mdash; trigger or process builder calling SOQL per record</li>
<li>Check Limits.getQueries() at key points</li>
<li>Review ALL automation on the object (triggers, flows, process builders can stack)</li>
</ul>
<p><strong>Common root causes for 5-year devs to know:</strong></p>
<ul>
<li>Trigger calling helper method with SOQL, invoked per-record in bulk</li>
<li>Multiple automations stacking (trigger + flow + PB all querying same object)</li>
<li>Recursive trigger re-entry</li>
<li>@wire in LWC calling cacheable Apex that itself makes queries (N+1 on client)</li>
</ul>
<p><strong>Prevention:</strong></p>
<ul>
<li>Code reviews checking for SOQL/DML in loops</li>
<li>Apex unit tests with 200+ records (forces bulk)</li>
<li>Static analysis tools (PMD, Clayton)</li>
<li>Monitoring: <code>Limits.getQueries()</code> logging, Event Monitoring (Shield)</li>
<li>Governor limit custom alerts via Platform Events</li>
</ul>
<div class="must-mention"><h5>Signals of experience</h5><ul><li>Mentions debug log analysis technique</li><li>Understands automation stacking problem</li><li>Has a prevention strategy (not just reactive fixes)</li><li>Discusses team-level practices (code review, testing standards)</li></ul></div>`

    }

    function revealEvaluation() {
        document.getElementById('evaluation').classList.add('visible');
        document.getElementById('selfRate').classList.add('visible');
    }

    function revealNatural() {
        document.getElementById('naturalAnswer').classList.add('visible');
    }

    function skipQuestion() {
        rate('skipped');
    }

    function rate(rating) {
        scores.push({ round: currentRound, question: currentQuestion, rating });
        currentQuestion++;

        if (currentQuestion >= rounds[currentRound].questions.length) {
            // Round complete
            currentRound++;
            if (currentRound >= rounds.length) {
                showFinalResults();
            } else {
                showRoundIntro();
            }
        } else {
            showQuestion();
        }
    }

    function updateProgress() {
        const totalQuestions = rounds.reduce((sum, r) => sum + r.questions.length, 0);
        const answered = scores.length;
        document.getElementById('progressFill').style.width = (answered / totalQuestions * 100) + '%';
    }

    function showFinalResults() {
        stopTimer();
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        
        const totalQ = scores.length;
        const strong = scores.filter(s => s.rating === 'strong').length;
        const okay = scores.filter(s => s.rating === 'okay').length;
        const weak = scores.filter(s => s.rating === 'weak').length;
        const skipped = scores.filter(s => s.rating === 'skipped').length;
        
        const percentage = Math.round((strong / totalQ) * 100);
        let verdict, verdictColor;
        if (percentage >= 70) { verdict = 'Strong Hire! You demonstrated senior-level depth.'; verdictColor = 'var(--green-light)'; }
        else if (percentage >= 45) { verdict = 'Leaning Hire. Some areas need more depth for a senior role.'; verdictColor = 'var(--orange)'; }
        else { verdict = 'More preparation needed. Focus on the weak areas below.'; verdictColor = '#ff7b72'; }

        // Per-round breakdown
        let roundBreakdown = '';
        rounds.forEach((round, idx) => {
            const roundScores = scores.filter(s => s.round === idx);
            const roundStrong = roundScores.filter(s => s.rating === 'strong').length;
            roundBreakdown += `
                <div class="round-score">
                    <div class="rs-label">${round.name}</div>
                    <div class="rs-value" style="color: ${roundStrong >= round.questions.length * 0.6 ? 'var(--green-light)' : 'var(--orange)'};">${roundStrong}/${round.questions.length}</div>
                </div>`;
        });

        // Feedback per weak answer
        let feedback = '';
        const weakAnswers = scores.filter(s => s.rating === 'weak' || s.rating === 'skipped');
        if (weakAnswers.length > 0) {
            feedback = `<h3 style="margin: 24px 0 12px; font-size:1.1em;">&#x1F4DD; Areas to Review:</h3><ul class="feedback-list">`;
            weakAnswers.forEach(s => {
                const q = rounds[s.round].questions[s.question];
                feedback += `<li><span style="color:#ff7b72;">&#x25CF;</span><span><strong>${rounds[s.round].name}</strong>: ${q.q.substring(0, 80)}...</span></li>`;
            });
            feedback += '</ul>';
        }

        document.getElementById('content').innerHTML = '';
        document.getElementById('progressFill').style.width = '100%';
        document.getElementById('results').innerHTML = `
            <h2>Interview Debrief</h2>
            <div class="verdict">
                <div class="score-big" style="color:${verdictColor};">${percentage}%</div>
                <div class="verdict-text">${verdict}</div>
                <p style="color:var(--text-dim); font-size:0.85em; margin-top:8px;">Time: ${mins} minutes | ${totalQ} questions</p>
            </div>
            <div class="round-scores">${roundBreakdown}</div>
            <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:16px;">
                <div style="display:flex; justify-content:space-around; text-align:center;">
                    <div><div style="font-size:1.5em; color:var(--green-light);">${strong}</div><div style="font-size:0.8em; color:var(--text-muted);">Strong</div></div>
                    <div><div style="font-size:1.5em; color:var(--orange);">${okay}</div><div style="font-size:0.8em; color:var(--text-muted);">Partial</div></div>
                    <div><div style="font-size:1.5em; color:#ff7b72;">${weak}</div><div style="font-size:0.8em; color:var(--text-muted);">Weak</div></div>
                    <div><div style="font-size:1.5em; color:var(--text-dim);">${skipped}</div><div style="font-size:0.8em; color:var(--text-muted);">Skipped</div></div>
                </div>
            </div>
            ${feedback}
            <button class="retry-btn" onclick="restart()">&#x1F504; Retry Interview</button>
        `;
        document.getElementById('results').classList.add('visible');
    }

    function restart() {
        currentRound = 0; currentQuestion = 0; scores = [];
        document.getElementById('results').classList.remove('visible');
        document.getElementById('results').innerHTML = '';
        startTimer();
        showRoundIntro();
    }

    // Theme
    if (localStorage.getItem('study-theme') === 'light') document.body.classList.add('light');

    // Init
    startTimer();
    showRoundIntro();
    </script>
</body>
</html>
